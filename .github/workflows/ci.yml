name: CI - Lint, Test & Build

on:
  pull_request:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4  # Sin 'version: latest' → usa la de package.json

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Lint code
      run: pnpm lint

    - name: Run tests
      run: pnpm test
      env:
        NODE_ENV: test
        SECRET_JWT_KEY: 'test-secret-super-largo-para-tests'
        SECRET_REFRESH_JWT_KEY: 'test-secret-refresh-super-largo-para-tests'
        PASSWORD_PEPPER: 'test-pepper'

    - name: Build project
      run: pnpm build